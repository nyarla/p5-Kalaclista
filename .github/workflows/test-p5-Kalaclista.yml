name: Run tests for p5-Kalaclista

env:
  perl-version: '5.40'

on:
  pull_request:
    branches: ["*"]
    paths:
      - ".github/workflows/test-p5-Kalaclista.yml"
      - "cpanfile"
      - "cpanfile.snapshot"
      - "lib/**"
      - "t/**"
  push:
    branches:
      - main

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install XS dependencies
        run: |
          sudo apt-get update
          sudo apt-get install \
            --assume-yes \
            --no-install-recommends \
            libidn-dev
      - uses: shogo82148/actions-setup-perl@a198315ec4e9244f206879ea7b63078003aec8a6 # v1.41.1
        with:
          perl-version: ${{ env.perl-version }}
      - name: Install CPAN module dependencies
        run: |
          cpm install -Llocal Carton::Snapshot
          cpm install -Llocal
      - name: Run tests
        run: |
          prove -Ilocal/lib/perl5 -Ilib -It/lib -vr t/
